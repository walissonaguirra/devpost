baseURL = "https://walissonaguirra.dev/"
languageCode = "pt-BR"
title = "Walisson Aguirra"
enableRobotsTXT = true

[params]
  description = "Engenheiro de software com foco em backend e arquitetura de aplicações, Go Lang e PHP"
  author      = "Walisson Aguirra"
  favicon     = "https://cdn.walissonaguirra.dev/favicon.ico"
  # appleTouchIcon = "https://placehold.co/180x180/png?text=WA"
  # image       = "https://placehold.co/1200x630/png?text=Walisson+Aguirra"
  logo        = "https://cdn.walissonaguirra.dev/android-chrome-512x512.png"
  rssURL      = "/index.xml"
  sameAs = [
    "https://codeberg.org/walissonaguirra",
    "https://mastodon.social/@walissonaguirra",
  ]

[module]
  [[module.imports]]
    path = "codeberg.org/walissonaguirra/zero"

[menus]
  [[menus.main]]
    name = "Sobre"
    url = "/sobre/"
    weight = 1

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)'], ['$', '$']]
  [markup.highlight]
    style = 'github'
    lineNos = true

[minify]
  minifyOutput = true
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepWhitespace = false

[params.giscus]
  repo            = "walissonaguirra/devpost"
  repoId          = "R_kgDOSHj-7g"          # obtenha em https://giscus.app/
  category        = "Announcements"         # opcional
  categoryId      = "DIC_kwDOSHj-7s4C7RLH"  # opcional, recomendado
  mapping         = "title"									# pathname | url | title | og:title | specific | number
  strict          = "0"											# "1" para exigir match estrito do título
  reactionsEnabled = "1"
  emitMetadata    = "0"
  inputPosition   = "bottom"                # bottom | top
  theme           = "light"
  lang            = "pt"
