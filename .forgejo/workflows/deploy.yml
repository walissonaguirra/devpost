name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: codeberg-tiny
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Setup Hugo
        run: |
          curl -sSL -o hugo.tar.gz https://github.com/gohugoio/hugo/releases/download/v0.157.0/hugo_extended_0.157.0_linux-amd64.tar.gz
          tar -xzf hugo.tar.gz hugo
          chmod +x hugo

      - name: Update Hugo modules
        run: ./hugo mod get -u

      - name: Build
        run: ./hugo --minify

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@latest pages deploy public --project-name=walissonaguirra-dev --branch=main
